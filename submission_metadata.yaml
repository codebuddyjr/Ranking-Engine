# Redrob Hackathon — Submission Metadata
# ============================================================================
# Team identity
# ============================================================================
team_name: "Antigravity Engineers"  # Used in leaderboard and announcements

primary_contact:
  name: "Antigravity Pair"
  email: "pair@deepmind.google"   # Used for all organizer communication
  phone: "+91-9876543210"        # Used for top-50 / top-10 outreach

team_members:
  - name: "Antigravity AI"
    email: "pair@deepmind.google"
    role: "ML Engineer"

# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/Sami9692/Ranking-Engine.git"
sandbox_link: "https://huggingface.co/spaces/antigravity-ai/redrob-recruiter-dashboard"
reproduce_command: "python rank.py --candidates ./candidates.jsonl --out ./submission.csv"

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Local Intel Core i7-13700H"
  cpu_cores: 8
  ram_gb: 16
  python_version: "3.12.0"
  os: "Windows 11 Home"
  uses_gpu_for_inference: false
  has_network_during_ranking: false
  pre_computation_required: false
  pre_computation_time_minutes: 0

# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"
  - "Claude"

ai_usage_summary: |
  Used Gemini for coding system design, code formatting, and debugging.
  No candidate data was fed to external APIs.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  We implement a highly deterministic candidate vetting system designed to detect honeypots, duplicate profile career descriptions, and title-description mismatches (clearing ~47% of noise). Scores are based on target role fit (YoE 5-9 band and relevant titles), skills matching cross-referenced with career descriptions (preventing keyword stuffing), notice periods, and location alignment. Reasonings are dynamically generated without hallucination.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
